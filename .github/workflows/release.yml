name: Release

on:
  push:
    tags:
      - '[0-9]*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/tabik.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=tabik.keystore
          EOF

      - run: flutter pub get

      - run: flutter test

      - name: Build APKs
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date +%Y-%m-%d)
          DEFINES="--build-name=$VERSION \
            --dart-define=BUILD_HASH=$BUILD_HASH \
            --dart-define=BUILD_DATE=$BUILD_DATE"
          flutter build apk --release --split-per-abi $DEFINES
          flutter build apk --release $DEFINES

      - name: Rename APKs
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk   tabik-${VERSION}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk tabik-${VERSION}-armeabi-v7a.apk
          mv app-x86_64-release.apk      tabik-${VERSION}-x86_64.apk
          mv app-release.apk             tabik-${VERSION}-universal.apk

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "CHANGELOG<<EOF"
            bash scripts/gen_changelog.sh "$PREV_TAG" HEAD "${{ github.repository }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/tabik-*.apk
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
